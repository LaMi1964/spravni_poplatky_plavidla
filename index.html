<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Kalkulačka správních poplatků – plavidla</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Kalkulačka správních poplatků – plavidla</h1>

  <form id="fee-form">
    <fieldset>
      <legend>Typ prohlídky</legend>
      <label for="typProhlidky">Vyberte:</label>
      <select id="typProhlidky">
        <option value="alg1">Pravidelná / mimořádná prohlídka</option>
        <option value="alg2">První prohlídka</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Údaje o plavidle</legend>

      <label for="druh">Druh plavidla:</label>
      <select id="druh">
        <option value="plachetnice">Plachetnice</option>
        <option value="jine">Jiné malé plavidlo</option>
      </select>

      <label>
        <input type="checkbox" id="maKajutu">
        Plavidlo má kajutu
      </label>

      <label>
        <input type="checkbox" id="maMotor">
        Plavidlo má vlastní strojní pohon
      </label>

      <label for="delka">Délka plavidla L [m]:</label>
      <input type="text" id="delka">

      <label for="sirka">Šířka plavidla B [m]:</label>
      <input type="text" id="sirka">

      <label for="ponor">Maximální ponor T [m]:</label>
      <input type="text" id="ponor">

      <label>
        <input type="checkbox" id="maCE">
        Plavidlo má CE prohlášení o shodě
      </label>

      <label>
        <input type="checkbox" id="portal">
        Podáváte žádost elektronicky přes Portál dopravy
      </label>
    </fieldset>

    <button type="submit">Spočítat poplatek</button>
  </form>

  <div id="result" class="result"></div>

  <script src="fees.js"></script>
</body>
</html>
